# docker-compose.override.yml — loaded automatically by Docker Compose.
# Adds bind mounts for admin_web dev/hot-reload mode (the default).
#
# To run admin_web in production mode instead, set in .env:
#   BUILD_TARGET=runner
#   DEBUG=false

services:
  admin_web:
    volumes:
      - ./admin_web:/app
      - admin_web_node_modules:/app/node_modules

volumes:
  admin_web_node_modules:

[project]
name = "mentor-bot-feedback-service"
version = "1.0.0"
description = "Feedback and Pulse Survey Microservice for Mentor Bot"
requires-python = ">=3.14"
dependencies = [
  "aiofiles>=25.1.0",
  "alembic>=1.18.1",
  "asyncpg>=0.31.0",
  "fastapi>=0.128.0",
  "pydantic>=2.12.5",
  "pydantic-settings>=2.12.0",
  "python-dotenv>=1.2.1",
  "sqlalchemy[asyncio,mypy]>=2.0.46",
  "uvicorn[standard]>=0.40.0",
  "slowapi>=0.1.9",
]

[tool.uv]
dev-dependencies = [
  "debugpy>=1.8.20",
  "httpx>=0.28.1",
  "mypy>=1.19.1",
  "pytest>=9.0.2",
  "pytest-asyncio>=1.3.0",
  "pytest-cov>=7.0.0",
  "ruff>=0.14.14",
]

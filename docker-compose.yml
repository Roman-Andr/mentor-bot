x-common-env: &common-env
  LOG_LEVEL: INFO
  SERVICE_API_KEY: ${SERVICE_API_KEY}
  TZ: ${TZ}

services:
  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-dev}
      args:
        SERVICE_NAME: telegram_bot
    container_name: telegram_bot
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - service_logs:/var/log/app
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/telegram_db
      REDIS_URL: ${REDIS_URL}/3
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_API_KEY: ${TELEGRAM_API_KEY}
      TELEGRAM_PROXY: ${TELEGRAM_PROXY:-}
      AUTH_SERVICE_URL: http://auth_service:8000
      CHECKLISTS_SERVICE_URL: http://checklists_service:8000
      KNOWLEDGE_SERVICE_URL: http://knowledge_service:8000
      NOTIFICATION_SERVICE_URL: http://notification_service:8000
      ESCALATION_SERVICE_URL: http://escalation_service:8000
      MEETING_SERVICE_URL: http://meeting_service:8000
      FEEDBACK_SERVICE_URL: http://feedback_service:8000
      API_GATEWAY_URL: http://localhost:8000
      ENABLE_NOTIFICATIONS: "true"
      NOTIFICATION_HOUR: "9"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mentor_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'telegram_bot\\.main' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  admin_web:
    build:
      context: ./admin_web
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-dev}
    container_name: admin_web
    ports:
      - "3000:3000"
      - "9229:9229"
    environment:
      <<: *common-env
      DEBUG: ${DEBUG:-true}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/admin_web_db
      AUTH_SERVICE_URL: http://auth_service:8000
      CHECKLISTS_SERVICE_URL: http://checklists_service:8000
      KNOWLEDGE_SERVICE_URL: http://knowledge_service:8000
      NOTIFICATION_SERVICE_URL: http://notification_service:8000
      ESCALATION_SERVICE_URL: http://escalation_service:8000
      FEEDBACK_SERVICE_URL: http://feedback_service:8000
      MEETING_SERVICE_URL: http://meeting_service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mentor_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s
      start_interval: 3s

  auth_service:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-dev}
      args:
        SERVICE_NAME: auth_service
    container_name: auth_service
    ports:
      - "8001:8000"
    volumes:
      - service_logs:/var/log/app
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/auth_db
      REDIS_URL: ${REDIS_URL}/0
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      TELEGRAM_API_KEY: ${TELEGRAM_API_KEY}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      CHECKLISTS_SERVICE_URL: http://checklists_service:8000
      KNOWLEDGE_SERVICE_URL: http://knowledge_service:8000
      MEETING_SERVICE_URL: http://meeting_service:8000
      NOTIFICATION_SERVICE_URL: http://notification_service:8000
      ADMIN_WEB_URL: http://admin_web:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mentor_network

  checklists_service:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-dev}
      args:
        SERVICE_NAME: checklists_service
    container_name: checklists_service
    ports:
      - "8002:8000"
    volumes:
      - service_logs:/var/log/app
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/checklists_db
      REDIS_URL: ${REDIS_URL}/1
      AUTH_SERVICE_URL: http://auth_service:8000
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_SECURE_MODE: ${S3_SECURE_MODE:-false}
      CHECKLISTS_S3_BUCKET: ${CHECKLISTS_S3_BUCKET:-checklists-files}
      S3_PRESIGNED_URL_EXPIRY: ${S3_PRESIGNED_URL_EXPIRY:-3600}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - mentor_network

  knowledge_service:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-dev}
      args:
        SERVICE_NAME: knowledge_service
    container_name: knowledge_service
    ports:
      - "8003:8000"
    volumes:
      - service_logs:/var/log/app
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/knowledge_db
      REDIS_URL: ${REDIS_URL}/2
      AUTH_SERVICE_URL: http://auth_service:8000
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_SECURE_MODE: ${S3_SECURE_MODE:-false}
      KNOWLEDGE_S3_BUCKET: ${KNOWLEDGE_S3_BUCKET:-knowledge-files}
      S3_PRESIGNED_URL_EXPIRY: ${S3_PRESIGNED_URL_EXPIRY:-3600}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - mentor_network

  notification_service:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-dev}
      args:
        SERVICE_NAME: notification_service
    container_name: notification_service
    ports:
      - "8004:8000"
    volumes:
      - service_logs:/var/log/app
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/notification_db
      REDIS_URL: ${REDIS_URL}/4
      AUTH_SERVICE_URL: http://auth_service:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mentor_network

  feedback_service:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-dev}
      args:
        SERVICE_NAME: feedback_service
    container_name: feedback_service
    ports:
      - "8007:8000"
    volumes:
      - service_logs:/var/log/app
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/feedback_db
      REDIS_URL: ${REDIS_URL}/5
      AUTH_SERVICE_URL: http://auth_service:8000
      API_V1_PREFIX: /api/v1
      CORS_ORIGINS: '["*"]'
      ALLOWED_HOSTS: '["*"]'
      SERVICE_API_KEY: ${SERVICE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mentor_network

  escalation_service:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-dev}
      args:
        SERVICE_NAME: escalation_service
    container_name: escalation_service
    ports:
      - "8005:8000"
    volumes:
      - service_logs:/var/log/app
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/escalation_db
      REDIS_URL: ${REDIS_URL}/6
      AUTH_SERVICE_URL: http://auth_service:8000
      NOTIFICATION_SERVICE_URL: http://notification_service:8000
      API_V1_PREFIX: /api/v1
      CORS_ORIGINS: '["*"]'
      ALLOWED_HOSTS: '["*"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mentor_network

  meeting_service:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-dev}
      args:
        SERVICE_NAME: meeting_service
    container_name: meeting_service
    ports:
      - "8006:8000"
    volumes:
      - service_logs:/var/log/app
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/meeting_db
      REDIS_URL: ${REDIS_URL}/7
      AUTH_SERVICE_URL: http://auth_service:8000
      CORS_ORIGINS: '["*"]'
      ALLOWED_HOSTS: '["*"]'
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mentor_network

  postgres:
    container_name: postgres_container
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - mentor_network
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
      start_interval: 1s

  redis:
    container_name: redis_container
    image: redis:8.6.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mentor_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
      start_interval: 1s

  pgadmin:
    container_name: pgadmin4_container
    image: dpage/pgadmin4:9.14
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    networks:
      - mentor_network
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    entrypoint: /bin/sh -c "chmod 600 /pgpass; /entrypoint.sh;"
    user: root
    configs:
      - source: servers.json
        target: /pgadmin4/servers.json
      - source: pgpass
        target: /pgpass
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:80/misc/ping"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 60s
      start_interval: 5s

  redis-insight:
    image: redis/redisinsight:3.2
    restart: unless-stopped
    container_name: redis-insight
    ports:
      - "5540:5540"
    volumes:
      - redis-insight:/data
    environment:
      - RI_APP_HOST=0.0.0.0
      - RI_APP_PORT=5540
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
    networks:
      - mentor_network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://localhost:5540/api/health/',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 5s

  minio:
    container_name: minio_container
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - mentor_network
    command: server /data --console-address ":9001"
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 10s
      start_interval: 2s

  loki:
    container_name: loki
    image: grafana/loki:3.2.1
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki:/etc/loki
      - loki_data:/loki
    networks:
      - mentor_network
    command: -config.file=/etc/loki/loki-config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  alloy:
    container_name: alloy
    image: grafana/alloy:latest
    restart: unless-stopped
    volumes:
      - ./observability/alloy:/etc/alloy
      - service_logs:/var/log/app:ro
    networks:
      - mentor_network
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki

  grafana:
    container_name: grafana
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - mentor_network
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
volumes:
  postgres_data:
  redis_data:
  pgadmin-data:
  redis-insight:
  minio_data:
  loki_data:
  grafana_data:
  service_logs:

networks:
  mentor_network:
    driver: bridge

configs:
  pgpass:
    file: observability/pgadmin/pgpass
    name: pgpass
  servers.json:
    file: observability/pgadmin/servers.json
    name: servers.json
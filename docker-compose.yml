x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  # DEBUG: "true"
  LOG_LEVEL: INFO
  SERVICE_API_KEY: ${SERVICE_API_KEY}
  TZ: ${TZ:-UTC}

services:
  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: telegram_bot
    container_name: telegram_bot
    ports:
      - "5670:5671"
    environment:
      <<: *common-env
      REDIS_URL: ${REDIS_URL}/3
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_API_KEY: ${TELEGRAM_API_KEY}
      ENABLE_NOTIFICATIONS: "true"
      NOTIFICATION_HOUR: "9"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mentor_network
    restart: unless-stopped
    healthcheck:
      test: ["NONE"]

  admin_web:
    build:
      context: ./admin_web
      dockerfile: Dockerfile
    container_name: admin_web
    ports:
      - "3000:3000"
      - "9229:9229"
    environment:
      <<: *common-env
      AUTH_SERVICE_URL: http://auth_service:8000
      CHECKLISTS_SERVICE_URL: http://checklists_service:8000
      KNOWLEDGE_SERVICE_URL: http://knowledge_service:8000
      NOTIFICATION_SERVICE_URL: http://notification_service:8000
      ESCALATION_SERVICE_URL: http://escalation_service:8000
      FEEDBACK_SERVICE_URL: http://feedback_service:8000
      MEETING_SERVICE_URL: http://meeting_service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./admin_web:/app
      - /app/node_modules
    networks:
      - mentor_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 300s
      timeout: 1s
      retries: 10
      start_period: 10s
      start_interval: 3s

  auth_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth_service
    container_name: auth_service
    ports:
      - "8001:8000"
      - "5672:5671"
    environment:
      <<: *common-env
      REDIS_URL: ${REDIS_URL}/0
      TELEGRAM_API_KEY: ${TELEGRAM_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./auth_service/auth_service:/app/auth_service
    networks:
      - mentor_network

  checklists_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: checklists_service
    container_name: checklists_service
    ports:
      - "8002:8000"
      - "5673:5671"
    environment:
      <<: *common-env
      REDIS_URL: ${REDIS_URL}/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./checklists_service/checklists_service:/app/checklists_service
    networks:
      - mentor_network

  knowledge_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: knowledge_service
    container_name: knowledge_service
    ports:
      - "8003:8000"
      - "5674:5671"
    environment:
      <<: *common-env
      REDIS_URL: ${REDIS_URL}/2
      STORAGE_PATH: /var/lib/knowledge/files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./knowledge_service/knowledge_service:/app/knowledge_service
      - knowledge_files:/var/lib/knowledge/files
    networks:
      - mentor_network

  notification_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification_service
    container_name: notification_service
    ports:
      - "8004:8000"
      - "5675:5671"
    environment:
      <<: *common-env
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./notification_service/notification_service:/app/notification_service
    networks:
      - mentor_network

  feedback_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: feedback_service
    container_name: feedback_service
    ports:
      - "8007:8000"
      - "5676:5671"
    environment:
      <<: *common-env
      API_V1_PREFIX: /api/v1
      DATABASE_SCHEMA: feedback
      CORS_ORIGINS: '["*"]'
      ALLOWED_HOSTS: '["*"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./feedback_service/feedback_service:/app/feedback_service
    networks:
      - mentor_network

  escalation_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: escalation_service
    container_name: escalation_service
    ports:
      - "8005:8000"
      - "5677:5671"
    environment:
      <<: *common-env
      API_V1_PREFIX: /api/v1
      DATABASE_SCHEMA: escalation
      CORS_ORIGINS: '["*"]'
      ALLOWED_HOSTS: '["*"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./escalation_service/escalation_service:/app/escalation_service
    networks:
      - mentor_network

  meeting_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: meeting_service
    container_name: meeting_service
    ports:
      - "8006:8000"
      - "5678:5671"
    environment:
      <<: *common-env
      REDIS_URL: ${REDIS_URL}/4
      DATABASE_SCHEMA: meeting
      CORS_ORIGINS: '["*"]'
      ALLOWED_HOSTS: '["*"]'
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./meeting_service/meeting_service:/app/meeting_service
    networks:
      - mentor_network

  postgres:
    container_name: postgres_container
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - mentor_network
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 300s
      timeout: 1s
      retries: 10
      start_period: 5s
      start_interval: 1s

  redis:
    container_name: redis_container
    image: redis:8.4
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mentor_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 300s
      timeout: 1s
      retries: 10
      start_period: 5s
      start_interval: 1s

  pgadmin:
    container_name: pgadmin4_container
    image: dpage/pgadmin4:9.14
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    networks:
      - mentor_network
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    entrypoint: /bin/sh -c "chmod 600 /pgpass; /entrypoint.sh;"
    user: root
    configs:
      - source: servers.json
        target: /pgadmin4/servers.json
      - source: pgpass
        target: /pgpass

  redis-insight:
    image: redis/redisinsight:3.0
    restart: unless-stopped
    container_name: redis-insight
    ports:
      - "5540:5540"
    volumes:
      - redis-insight:/data
    environment:
      - RI_APP_HOST=0.0.0.0
      - RI_APP_PORT=5540
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
    networks:
      - mentor_network
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  pgadmin-data:
  redis-insight:
  knowledge_files:

networks:
  mentor_network:
    driver: bridge

configs:
  pgpass:
    content: postgres:5432:${POSTGRES_DB}:${POSTGRES_USER}:${POSTGRES_PASSWORD}
  servers.json:
    content: |
      {"Servers": {"1": {
        "Group": "Servers",
        "Name": "Main postgres database",
        "Host": "postgres",
        "Port": 5432,
        "MaintenanceDB": "${POSTGRES_DB}",
        "Username": "${POSTGRES_USER}",
        "UseSSHTunnel": 0,
        "TunnelPort": "22",
        "TunnelAuthentication": 0,
        "KerberosAuthentication": false,
        "ConnectionParameters": {
            "sslmode": "prefer",
            "connect_timeout": 10,
            "sslcompression": 0,
            "passfile": "/pgpass"
        }
      }}}

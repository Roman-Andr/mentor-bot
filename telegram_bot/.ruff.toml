# Ruff configuration for telegram_bot
# All rules enabled (ALL in pyproject.toml) with intentional ignores below.

[lint]
# Allow magic numbers for thresholds, file sizes, etc.
ignore = [
    "PLR2004",  # Magic value used in comparison (intentional for thresholds)
    "ARG001",   # Unused function argument (aiogram DI requires parameter names)
    "ARG002",   # Unused method argument (aiogram DI requires parameter names)
    "PLC0415",  # Import not at top-level (deferred to avoid circular imports)
    "BLE001",   # Blind exception catch (resilient background tasks)
    "D213",     # Multi-line docstring starts at second line (prefer D212)
    "D413",     # Missing blank line after last section
    "D203",     # One-blank-line required before class docstring
]

[lint.per-file-ignores]
# Keyboard files often have simple f-strings
"telegram_bot/keyboards/*.py" = ["F541"]

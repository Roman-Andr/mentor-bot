        uses: docker/build-push-action@v7
        with:
          context: ./admin_web
          file: ./admin_web/Dockerfile
          target: runner
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha,scope=admin_web
          cache-to: type=gha,mode=max,scope=admin_web

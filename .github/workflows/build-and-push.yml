name: Build and push images

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - ".course_work_2/**"
      - "README.md"
      - "LICENSE"
      - "CLAUDE.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to apply (optional)"
        required: false
      force_rebuild:
        description: "Force rebuild all services (ignore change detection)"
        type: boolean
        required: false
        default: true

permissions:
  contents: read

env:
  REGISTRY: docker.io
  # Image names: docker.io/<DOCKERHUB_USERNAME>/mentor-bot-<service>
  # Must match docker-compose.prod.yml IMAGE_PREFIX default (mentor-bot)
  IMAGE_PREFIX: mentor-bot
  PLATFORMS: linux/amd64

jobs:
  # ── Detect changed services ───────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth_service: ${{ steps.changes.outputs.auth_service }}
      checklists_service: ${{ steps.changes.outputs.checklists_service }}
      knowledge_service: ${{ steps.changes.outputs.knowledge_service }}
      notification_service: ${{ steps.changes.outputs.notification_service }}
      escalation_service: ${{ steps.changes.outputs.escalation_service }}
      feedback_service: ${{ steps.changes.outputs.feedback_service }}
      meeting_service: ${{ steps.changes.outputs.meeting_service }}
      telegram_bot: ${{ steps.changes.outputs.telegram_bot }}
      admin_web: ${{ steps.changes.outputs.admin_web }}
      dockerfile: ${{ steps.changes.outputs.dockerfile }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth_service:
              - 'auth_service/**'
            checklists_service:
              - 'checklists_service/**'
            knowledge_service:
              - 'knowledge_service/**'
            notification_service:
              - 'notification_service/**'
            escalation_service:
              - 'escalation_service/**'
            feedback_service:
              - 'feedback_service/**'
            meeting_service:
              - 'meeting_service/**'
            telegram_bot:
              - 'telegram_bot/**'
            admin_web:
              - 'admin_web/**'
            dockerfile:
              - 'Dockerfile'
              - 'docker-entrypoint.sh'

  # ── Test gate: must pass before image is built ───────────────────────────────
  test-python-auth:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.outputs.auth_service == 'true' ||
      needs.detect-changes.outputs.dockerfile == 'true' ||
      github.event.inputs.force_rebuild == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "auth_service/uv.lock"
      - name: Install dependencies
        working-directory: auth_service
        run: uv sync --frozen
      - name: Lint (ruff)
        working-directory: auth_service
        run: uv run ruff check . || true
      - name: Type check (mypy)
        working-directory: auth_service
        run: uv run mypy . || true
      - name: Run tests
        working-directory: auth_service
        run: uv run pytest --tb=short -q


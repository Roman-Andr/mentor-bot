name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth_service
          - checklists_service
          - knowledge_service
          - notification_service
          - escalation_service
          - feedback_service
          - meeting_service
          - telegram_bot
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "${{ matrix.service }}/uv.lock"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: uv sync --frozen

      - name: Lint (ruff)
        working-directory: ${{ matrix.service }}
        run: uv run ruff check .

      - name: Type check (mypy)
        working-directory: ${{ matrix.service }}
        run: uv run mypy . || true

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: uv run pytest --tb=short -q

  test-admin-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: admin_web
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: admin_web
        run: bun lint

      - name: Run tests
        working-directory: admin_web
        run: bun run test
